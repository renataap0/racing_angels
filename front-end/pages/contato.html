<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racing Angels | Contato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">
  <canvas class="particles-canvas" id="particlesCanvas" aria-hidden="true"></canvas>

  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Racing Angels">
        <span class="brand-logo" aria-hidden="true">
          <svg class="angel-logo" viewBox="0 0 180 108">
            <path class="logo-halo" d="M68 17c6-9 38-9 44 0 4 6-1 13-22 13S64 23 68 17Z"></path>
            <path class="logo-wing" d="M70 49C47 31 26 28 9 37c18 2 31 8 40 16-16-5-30-5-42 1 17 4 30 10 39 20-13-2-24-1-34 4 21 7 41 7 59-4"></path>
            <path class="logo-wing right" d="M110 49c23-18 44-21 61-12-18 2-31 8-40 16 16-5 30-5 42 1-17 4-30 10-39 20 13-2 24-1 34 4-21 7-41 7-59-4"></path>
            <path class="logo-letter" d="M90 31 60 88h17l5-11h16l5 11h17L90 31Zm-3 35 3-8 3 8h-6Z"></path>
          </svg>
        </span>
        <span class="brand-text">RACING ANGELS</span>
      </a>

      <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="mainMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="mainMenu" aria-label="Menu principal">
        <a href="index.html">Inicio</a>
        <a href="equipe.html">Equipe</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="analytics.html">Analises</a>
        <a href="pistas.html">Pistas</a>
        <a href="grid.html">Classificacao</a>
        <a href="loja.html">Loja</a>
        <a href="contato.html" aria-current="page">Contato</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <main class="contact-layout apple-reveal">
      <section class="auth-copy">
        <p class="eyebrow">Contato</p>
        <h1>Fale com a Racing Angels</h1>
        <p>
          Fale com a equipe sobre parcerias, imprensa, operacao de pista, projetos digitais
          ou relacionamento com a marca Racing Angels.
        </p>
      </section>

      <section class="contact-card texture-panel">
        <p class="dashboard-kicker">Mensagem</p>
        <h2>Solicitar contato</h2>
        <form class="contact-form">
          <label>
            <span>Nome</span>
            <input type="text" name="name" placeholder="Seu nome" required>
          </label>
          <label>
            <span>E-mail</span>
            <input type="email" name="email" placeholder="voce@equipe.com" required>
          </label>
          <label>
            <span>Assunto</span>
            <input type="text" name="subject" placeholder="Parceria, imprensa ou atendimento" required>
          </label>
          <label>
            <span>Mensagem</span>
            <textarea name="message" placeholder="Conte o que voce precisa" required></textarea>
          </label> 
          <button class="btn btn-primary" type="submit">Enviar mensagem</button>
        </form>
      </section>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="script.js"></script>
</body>
</html>
